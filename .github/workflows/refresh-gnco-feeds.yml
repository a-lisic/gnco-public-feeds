name: Refresh GNCO public feeds

on:
  workflow_dispatch:
  schedule:
    # UTC. Minute 17 avoids GitHub's high-load start-of-hour window.
    - cron: "17 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/refresh-gnco-feeds.yml"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "test/**"
      - "tsconfig.json"

concurrency:
  group: "gnco-public-feeds-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Install dependencies
        run: npm ci

      - name: Verify feed code
        run: npm run typecheck && npm test

      - name: Build static public feeds
        env:
          PUBLIC_BASE_URL: ${{ steps.pages.outputs.base_url }}
          PREVIOUS_BASE_URL: ${{ steps.pages.outputs.base_url }}
          STATIC_FEED_OUTPUT: ${{ github.workspace }}/dist-pages
          CHANNEL_ID: "25787"
          STALE_AFTER_SECONDS: "7200"
          HEALTH_MAX_STALE_SECONDS: "86400"
          CC_USER_AGENT: "GNCO GitHub Pages feed (${{ github.server_url }}/${{ github.repository }})"
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: dist-pages

  deploy:
    needs: build
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static feeds to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
